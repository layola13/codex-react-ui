name: Build & Release Windows Preview

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    name: Build and Upload Windows Release
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build web & server assets
        run: bun run build

      - name: Compile Windows executable (.exe)
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path dist-release
          bun build --compile --target=bun-windows-x64 ./apps/server/src/index.ts --outfile dist-release/codex-react-ui-windows-x64.exe

      - name: Generate Release Tag & Name
        shell: powershell
        run: |
          $dateStr = Get-Date -Format "yyyyMMdd"
          $envTag = "preview-$dateStr"
          Add-Content -Path $env:GITHUB_ENV -Value "RELEASE_TAG=$envTag"
          Write-Host "Release Tag: $envTag"

      - name: Create Zip Archive
        shell: powershell
        run: |
          Compress-Archive -Path dist-release/codex-react-ui-windows-x64.exe -DestinationPath codex-react-ui-windows-x64.zip -Force

      - name: Create GitHub Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: ${{ env.RELEASE_TAG }}
          body: |
            ## Codex React UI - Preview Build (${{ env.RELEASE_TAG }})
            
            这是由 GitHub Actions 自动编译生成的 Windows 独立可执行程序。
            
            ### 🚀 使用说明
            1. 下载 `codex-react-ui-windows-x64.exe` 或 `codex-react-ui-windows-x64.zip`
            2. 双击运行 `codex-react-ui-windows-x64.exe`
            3. 在浏览器中打开提示的本地地址（默认 `http://127.0.0.1:43110`）即可使用。
          prerelease: true
          files: |
            dist-release/codex-react-ui-windows-x64.exe
            codex-react-ui-windows-x64.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
