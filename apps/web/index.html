<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#111827" />
    <title>Codex React UI</title>
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" href="/icons/icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&family=Manrope:wght@200..800&family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&display=swap" rel="stylesheet">
    <style>
      html,
      body,
      #root {
        min-height: 100%;
      }

      body {
        margin: 0;
        background: #f7f9fc;
      }

      .app-preload {
        min-height: 100vh;
        display: grid;
        place-items: center;
        color: #111827;
        font-family: "Manrope", "Plus Jakarta Sans", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        overflow: hidden;
      }

      .app-preload__panel {
        display: grid;
        justify-items: center;
        gap: 14px;
        padding: 24px;
      }

      .app-preload__mark {
        position: relative;
        width: 72px;
        height: 72px;
        display: grid;
        place-items: center;
      }

      .app-preload__mark::before {
        content: "";
        position: absolute;
        inset: 0;
        border-radius: 50%;
        border: 3px solid rgba(17, 24, 39, 0.1);
        border-top-color: #1877f2;
        animation: app-preload-spin 0.9s linear infinite;
      }

      .app-preload__icon {
        width: 38px;
        height: 38px;
        border-radius: 12px;
        box-shadow: 0 10px 24px rgba(24, 119, 242, 0.22);
      }

      .app-preload__title {
        margin: 2px 0 0;
        font-size: 18px;
        font-weight: 800;
        letter-spacing: 0;
      }

      .app-preload__status {
        margin: 0;
        color: #64748b;
        font-size: 13px;
      }

      .app-preload__bar {
        width: min(220px, 58vw);
        height: 4px;
        border-radius: 999px;
        background: rgba(17, 24, 39, 0.08);
        overflow: hidden;
      }

      .app-preload__bar::before {
        content: "";
        display: block;
        width: 42%;
        height: 100%;
        border-radius: inherit;
        background: #1877f2;
        animation: app-preload-slide 1.25s ease-in-out infinite;
      }

      @media (prefers-color-scheme: dark) {
        body {
          background: #05070d;
        }

        .app-preload {
          color: #f8fafc;
        }

        .app-preload__status {
          color: #94a3b8;
        }

        .app-preload__mark::before {
          border-color: rgba(248, 250, 252, 0.12);
          border-top-color: #60a5fa;
        }

        .app-preload__bar {
          background: rgba(248, 250, 252, 0.12);
        }

        .app-preload__bar::before {
          background: #60a5fa;
        }
      }

      @keyframes app-preload-spin {
        to {
          transform: rotate(360deg);
        }
      }

      @keyframes app-preload-slide {
        0% {
          transform: translateX(-115%);
        }
        50% {
          transform: translateX(70%);
        }
        100% {
          transform: translateX(255%);
        }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="app-preload" role="status" aria-live="polite" aria-label="Loading Codex">
        <div class="app-preload__panel">
          <div class="app-preload__mark" aria-hidden="true">
            <img class="app-preload__icon" src="/icons/icon.svg" alt="" />
          </div>
          <p class="app-preload__title">Codex</p>
          <p class="app-preload__status">Starting workbench...</p>
          <div class="app-preload__bar" aria-hidden="true"></div>
        </div>
      </div>
    </div>
    <noscript>Codex requires JavaScript to run.</noscript>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
